    :root{
      --bg:#fffafc;
      --ink:#4f4a69;
      --muted:#7b7493;
      --line:#eadff2;
      --card:#ffffff;
      --pink:#ffd9ea;
      --lav:#e8e1ff;
      --mint:#def7ee;
      --sky:#e2f2ff;
      --butter:#fff2bd;
      --shadow:0 18px 50px rgba(143, 120, 182, .13);
      --radius:34px;
    }

    *{box-sizing:border-box}

    html,body{height:100%}

    body{
      margin:0;
      font-family:Inter, "Nunito", system-ui, sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255,221,236,.9) 0%, transparent 26%),
        radial-gradient(circle at top right, rgba(224,238,255,.85) 0%, transparent 24%),
        linear-gradient(180deg, #fffafd 0%, #fffefb 100%);
    }

    .page{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:26px 16px 34px;
    }

    .shell{
      width:min(100%, 520px);
      text-align:center;
    }

    h1{
      margin:0 0 18px;
      font-size:clamp(2rem, 5vw, 3rem);
      line-height:1;
      letter-spacing:-.04em;
      font-weight:900;
      color:#4d4768;
    }

    .card{
      width:min(100%, 440px);
      height:min(78vh, 760px);
      min-height:620px;
      margin:0 auto;
      position:relative;
      perspective:1600px;
    }

    .card-inner{
      position:relative;
      width:100%;
      height:100%;
      transform-style:preserve-3d;
      transition:transform .72s ease;
    }

    .card.is-flipped .card-inner{transform:rotateY(180deg)}

    .face{
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      border-radius:var(--radius);
      border:1.5px solid var(--line);
      background:var(--card);
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .front{
      padding:24px 24px 28px;
      background:linear-gradient(180deg, #fffafc 0%, #ffffff 100%);
    }

    .back{
      padding:22px 22px 18px;
      transform:rotateY(180deg);
      background:linear-gradient(180deg, #ffffff 0%, #fffafc 100%);
    }

    .head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:16px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff8fc;
      font-size:.96rem;
      font-weight:800;
      color:#6a6484;
      text-align:left;
    }

    .flip-btn{
      width:56px;
      height:56px;
      border:none;
      border-radius:999px;
      cursor:pointer;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg, var(--pink), var(--lav));
      color:#5e5977;
      box-shadow:0 10px 24px rgba(142, 120, 181, .14);
      font-size:1.45rem;
      font-weight:900;
      transition:transform .18s ease, box-shadow .18s ease;
      flex:0 0 auto;
    }

    .flip-btn:hover,
    .flip-btn:focus-visible,
    .nav-btn:hover,
    .nav-btn:focus-visible{
      transform:translateY(-2px) scale(1.02);
      box-shadow:0 14px 28px rgba(142, 120, 181, .2);
      outline:none;
    }

    .front-body{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:20px;
      padding:8px 4px 14px;
    }

    .art{
      width:min(100%, 310px);
      margin-inline:auto;
    }

    .art svg{display:block; width:100%; height:auto}

    .name{
      margin:0;
      font-size:clamp(2rem, 5.3vw, 2.75rem);
      line-height:1.03;
      letter-spacing:-.04em;
      font-weight:900;
      color:#4f4969;
    }

    .mini{
      margin:0;
      font-size:1.05rem;
      line-height:1.35;
      color:#8a84a2;
      max-width:280px;
    }

    .back-title{
      margin:2px 0 0;
      font-size:1.8rem;
      line-height:1.05;
      letter-spacing:-.03em;
      font-weight:900;
      text-align:left;
      color:#4f4968;
    }

    .back-scroll{
      flex:1;
      min-height:0;
      overflow:auto;
      padding-right:4px;
      text-align:left;
      scrollbar-width:thin;
      scrollbar-color:#dac9ef transparent;
    }

    .back-scroll::-webkit-scrollbar{width:8px}
    .back-scroll::-webkit-scrollbar-thumb{background:#dac9ef;border-radius:999px}

    .row{
      padding:13px 0 14px;
      border-bottom:1px solid #efe6f5;
    }

    .row:last-child{border-bottom:none}

    .label{
      display:block;
      margin-bottom:5px;
      font-size:.78rem;
      font-weight:900;
      letter-spacing:.1em;
      text-transform:uppercase;
      color:#8d7fad;
    }

    .value{
      display:block;
      font-size:1rem;
      line-height:1.42;
      color:#5a556f;
    }

    .controls{
      width:min(100%, 440px);
      margin:16px auto 0;
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:10px;
    }

    .nav-btn{
      border:none;
      cursor:pointer;
      min-height:54px;
      border-radius:999px;
      background:#fff;
      border:1.5px solid var(--line);
      color:#5f5979;
      font-size:1rem;
      font-weight:800;
      padding:0 16px;
      box-shadow:0 10px 24px rgba(142,120,181,.08);
      transition:transform .18s ease, box-shadow .18s ease;
    }

    .nav-btn.prev{justify-self:start}
    .nav-btn.next{justify-self:end}

    .count{
      font-size:.96rem;
      font-weight:800;
      color:#7c7594;
    }

    @media (max-width:520px){
      .page{padding:18px 12px 26px}
      .card{width:100%; min-height:560px; height:min(76vh, 700px)}
      .front{padding:18px 18px 22px}
      .back{padding:18px 18px 14px}
      .chip{font-size:.88rem; padding:9px 14px}
      .flip-btn{width:50px;height:50px;font-size:1.3rem}
      .back-title{font-size:1.55rem}
      .mini{font-size:.98rem}
      .value{font-size:.95rem}
      .controls{grid-template-columns:1fr auto 1fr; gap:8px}
      .nav-btn{min-height:48px; font-size:.92rem; padding:0 12px}
    }
  </style>
</head>

    }

    function render(){
      const item = exams[current];
      card.classList.toggle('is-flipped', flipped);
      count.textContent = `${current + 1} / ${exams.length}`;
      cardInner.innerHTML = `
        <div class="face front">
          <div class="head">
            <span class="chip">${item.classif}</span>
            <button class="flip-btn" id="flipFront" type="button" aria-label="Ver reverso">↻</button>
          </div>
          <div class="front-body">
            <div class="art">${art(item.icon)}</div>
            <h2 class="name">${item.name}</h2>
            <p class="mini">${item.short}</p>
          </div>
        </div>

        <div class="face back">
          <div class="head">
            <div>
              <span class="chip">${item.classif}</span>
              <h2 class="back-title">${item.name}</h2>
            </div>
            <button class="flip-btn" id="flipBack" type="button" aria-label="Volver al frente">↺</button>
          </div>
          <div class="back-scroll">
            
            <div class="row"><span class="label">Qué revisa</span><span class="value">${item.checks}</span></div>
            <div class="row"><span class="label">Cuándo se recomienda</span><span class="value">${item.recommend}</span></div>
            <div class="row"><span class="label">Para qué sirve</span><span class="value">${item.purpose}</span></div>
            <div class="row"><span class="label">En qué especies</span><span class="value">${item.species}</span></div>
            <div class="row"><span class="label">Qué usa</span><span class="value">${item.uses}</span></div>
          </div>
        </div>
      `;

      document.getElementById('flipFront').addEventListener('click', () => {
        flipped = true;
        card.classList.add('is-flipped');
      });
      document.getElementById('flipBack').addEventListener('click', () => {
        flipped = false;
        card.classList.remove('is-flipped');
      });
    }

    prevBtn.addEventListener('click', () => {
      current = (current - 1 + exams.length) % exams.length;
      flipped = false;
      render();
    });

    nextBtn.addEventListener('click', () => {
      current = (current + 1) % exams.length;
      flipped = false;
      render();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') { current = (current - 1 + exams.length) % exams.length; flipped = false; render(); }
      if (e.key === 'ArrowRight') { current = (current + 1) % exams.length; flipped = false; render(); }
      if (e.key === 'Enter' || e.key === ' ') {
        if (document.activeElement === prevBtn || document.activeElement === nextBtn) return;
        e.preventDefault();
        flipped = !flipped;
        card.classList.toggle('is-flipped', flipped);
      }
    });

    render();
  </script>
